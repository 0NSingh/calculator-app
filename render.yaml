services:
  - type: web
    name: calculator-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -e . && pytest
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.13"
      - key: DATABASE_URL
        sync: false
    repo: https://github.com/0NSingh/calculator-app.git